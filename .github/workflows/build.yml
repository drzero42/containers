name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.list.outputs.images }}
      has_images: ${{ steps.list.outputs.has_images }}
    steps:
      - uses: actions/checkout@v7
      - id: list
        run: |
          shopt -s nullglob
          names=()
          for dir in images/*/; do
            [ -f "${dir}Dockerfile" ] || continue
            names+=("$(basename "$dir")")
          done
          if [ ${#names[@]} -eq 0 ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
          else
            printf -v json '"%s",' "${names[@]}"
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "images=[${json%,}]" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up crane
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: imjasonh/setup-crane@v0.4

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/${{ matrix.image }}"
          short_sha="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            date_today=$(date -u +%F)
            # crane ls exits non-zero on a not-yet-published image; that's expected on first push.
            existing=$(crane ls "${image}" 2>/dev/null \
              | grep -E "^${date_today}-[0-9]+$" \
              | sed "s/^${date_today}-//" \
              | sort -n \
              | tail -1 || true)
            n=$(( ${existing:-0} + 1 ))
            tag="${date_today}-${n}"
            echo "tags=${image}:${tag},${image}:latest" >> "$GITHUB_OUTPUT"
            echo "load_tag=${image}:${tag}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:pr-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "load_tag=${image}:pr-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      # Recompute pinned *_SHA256 args from the pinned version before building,
      # so a Renovate version bump builds green even though Renovate can't update
      # the checksum itself. The persist-checksums job pushes the fix back.
      - name: Sync pinned checksums
        run: bash scripts/sync-checksums.sh "images/${{ matrix.image }}/Dockerfile"

      - name: Build (load locally for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          load: true
          tags: ${{ steps.tags.outputs.load_tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Smoke test entrypoint
        run: |
          set -euo pipefail
          load_tag="${{ steps.tags.outputs.load_tag }}"
          # Run with no env vars; expect non-zero exit + "must be set" on stderr.
          if docker run --rm "${load_tag}" >/tmp/smoke.stdout 2>/tmp/smoke.stderr; then
            echo "ERROR: image exited 0 with no env vars set" >&2
            cat /tmp/smoke.stdout /tmp/smoke.stderr >&2
            exit 1
          fi
          if ! grep -q "must be set" /tmp/smoke.stderr; then
            echo "ERROR: stderr did not contain 'must be set'" >&2
            cat /tmp/smoke.stderr >&2
            exit 1
          fi
          echo "smoke OK"

      - name: Smoke test age-plugin-yubikey
        if: matrix.image == 'bitwarden-backup'
        run: |
          set -euo pipefail
          load_tag="${{ steps.tags.outputs.load_tag }}"
          out=$(docker run --rm --entrypoint age-plugin-yubikey "${load_tag}" --version)
          echo "$out"
          if ! echo "$out" | grep -q '^age-plugin-yubikey '; then
            echo "ERROR: age-plugin-yubikey --version output unexpected" >&2
            exit 1
          fi
          echo "plugin smoke OK"

      - name: Push
        if: steps.tags.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # On a same-repo PR (e.g. Renovate's version bumps), commit any checksum the
  # build had to recompute back onto the PR branch, so the merged source pins the
  # correct hash. Runs only after a green build. This commit's author is listed in
  # renovate.json's gitIgnoredAuthors so Renovate doesn't treat the branch as
  # edited-by-a-stranger and stop managing it.
  persist-checksums:
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Sync pinned checksums
        run: bash scripts/sync-checksums.sh

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "checksums already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: sync pinned checksums"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
