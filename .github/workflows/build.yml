name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.list.outputs.images }}
      has_images: ${{ steps.list.outputs.has_images }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          shopt -s nullglob
          names=()
          for dir in images/*/; do
            [ -f "${dir}Dockerfile" ] || continue
            names+=("$(basename "$dir")")
          done
          if [ ${#names[@]} -eq 0 ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
          else
            printf -v json '"%s",' "${names[@]}"
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "images=[${json%,}]" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/${{ matrix.image }}"
          short_sha="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tags=${image}:latest,${image}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:pr-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          push: ${{ steps.tags.outputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
